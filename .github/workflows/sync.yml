name: Sync
on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      skip_render_deploy:
        description: 'Skip Render redeploy'
        required: false
        default: 'false'
        type: boolean
permissions:
  contents: write
  workflows: write
jobs:
  sync-build-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Test
        run: echo "works"
