name: Weekly Upstream Sync & Database Upload

on:
  schedule:
    # Every Sunday at 6am UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:
    # Manual trigger for testing
    inputs:
      skip_render_deploy:
        description: 'Skip Render redeploy (for testing)'
        required: false
        default: 'false'
        type: boolean

jobs:
  sync-build-upload:
    runs-on: ubuntu-latest
    
    steps:
      # ============================================
      # STEP 1: Sync upstream → fork
      # ============================================
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync from upstream
        run: |
          echo "📥 Adding upstream remote..."
          git remote add upstream https://github.com/czlonkowski/n8n-mcp.git || true
          
          echo "📥 Fetching upstream..."
          git fetch upstream
          
          echo "🔀 Merging upstream/main..."
          git merge upstream/main --no-edit || {
            echo "⚠️ Merge conflict detected, attempting auto-resolve..."
            git checkout --theirs .
            git add .
            git commit -m "chore: auto-resolve merge conflicts from upstream"
          }
          
          echo "📤 Pushing to origin..."
          git push origin main
          
          echo "✅ Upstream sync complete"

      # ============================================
      # STEP 2: Build fresh database
      # ============================================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clone n8n documentation
        run: |
          echo "📚 Cloning n8n-docs for node documentation..."
          git clone --depth 1 https://github.com/n8n-io/n8n-docs.git n8n-docs
          echo "✅ n8n-docs cloned successfully"

      - name: Build TypeScript
        run: npm run build

      - name: Rebuild database with ALL templates
        env:
          MIN_VIEWS: 0
          DATE_MONTHS: 0
        run: |
          echo "🔨 Rebuilding nodes.db..."
          npm run rebuild

          echo "📥 Fetching ALL templates from n8n.io (no filters)..."
          npm run fetch:templates

          # Validate database
          TEMPLATE_COUNT=$(sqlite3 data/nodes.db "SELECT COUNT(*) FROM templates" 2>/dev/null || echo "0")
          NODE_COUNT=$(sqlite3 data/nodes.db "SELECT COUNT(*) FROM nodes" 2>/dev/null || echo "0")
          DOC_COUNT=$(sqlite3 data/nodes.db "SELECT COUNT(*) FROM nodes WHERE documentation IS NOT NULL;" 2>/dev/null || echo "0")

          echo "📊 Database stats:"
          echo "   Templates: $TEMPLATE_COUNT"
          echo "   Nodes: $NODE_COUNT"
          echo "   Documented nodes: $DOC_COUNT"

          if [ "$TEMPLATE_COUNT" -lt 7000 ]; then
            echo "❌ Database validation failed: only $TEMPLATE_COUNT templates (expected >7000)"
            exit 1
          fi

          if [ "$DOC_COUNT" -lt 700 ]; then
            echo "❌ Database validation failed: only $DOC_COUNT nodes with docs (expected >700)"
            exit 1
          fi

          echo "✅ Database rebuild complete with full template set"

      # ============================================
      # STEP 3: Upload to Supabase Storage
      # ============================================
      - name: Compress and upload to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "📦 Compressing database..."
          gzip -c data/nodes.db > nodes.db.gz
          
          FILESIZE=$(ls -lh nodes.db.gz | awk '{print $5}')
          echo "   Compressed size: $FILESIZE"
          
          echo "📤 Uploading to Supabase Storage..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PUT "${SUPABASE_URL}/storage/v1/object/build-cache/nodes.db.gz" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/gzip" \
            -H "Cache-Control: no-cache" \
            -H "x-upsert: true" \
            --data-binary @nodes.db.gz)
          
          if [ "$HTTP_STATUS" -eq 200 ] || [ "$HTTP_STATUS" -eq 201 ]; then
            echo "✅ Upload successful (HTTP $HTTP_STATUS)"
          else
            echo "❌ Upload failed (HTTP $HTTP_STATUS)"
            exit 1
          fi

      # ============================================
      # STEP 4: Trigger Render redeploy
      # ============================================
      - name: Trigger Render redeploy
        if: ${{ inputs.skip_render_deploy != 'true' }}
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ secrets.SERVICE_ID }}
        run: |
          echo "🚀 Triggering Render redeploy..."
          
          RESPONSE=$(curl -s -X POST "https://api.render.com/v1/services/${SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}')
          
          DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
          
          if [ -n "$DEPLOY_ID" ]; then
            echo "✅ Redeploy triggered successfully"
            echo "   Deploy ID: $DEPLOY_ID"
          else
            echo "⚠️ Redeploy may have failed. Response:"
            echo "$RESPONSE"
            # Don't fail the workflow - upload was successful
          fi

      # ============================================
      # Summary
      # ============================================
      - name: Summary
        run: |
          echo ""
          echo "============================================"
          echo "✅ Weekly sync complete!"
          echo "============================================"
          echo ""
          echo "Actions performed:"
          echo "  1. Synced upstream czlonkowski/n8n-mcp → baxterlabsai/n8n-mcp"
          echo "  2. Rebuilt nodes.db with latest n8n data"
          echo "  3. Uploaded nodes.db.gz to Supabase Storage"
          echo "  4. Triggered Render redeploy (if not skipped)"
          echo ""
          echo "Tech Factory will use the updated database on next deployment."
