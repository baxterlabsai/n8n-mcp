# Weekly Upstream Sync & Database Upload
# 
# Syncs latest n8n nodes/templates from upstream czlonkowski/n8n-mcp,
# rebuilds the SQLite database, uploads to Tech Factory Supabase Storage,
# and triggers a Render redeploy to pick up the fresh database.
#
# Schedule: Every Sunday 6am UTC
# Manual trigger: workflow_dispatch

name: Weekly Upstream Sync

on:
  schedule:
    - cron: '0 6 * * 0'  # Every Sunday 6am UTC
  workflow_dispatch:  # Manual trigger for testing

jobs:
  sync-build-upload:
    runs-on: ubuntu-latest
    
    steps:
      # =========================================================================
      # Step 1: Checkout fork with full history (needed for merge)
      # =========================================================================
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # =========================================================================
      # Step 2: Sync upstream (czlonkowski/n8n-mcp) → fork (baxterlabsai/n8n-mcp)
      # =========================================================================
      - name: Sync upstream changes
        run: |
          echo "📥 Syncing upstream czlonkowski/n8n-mcp → baxterlabsai/n8n-mcp"
          
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add upstream remote
          git remote add upstream https://github.com/czlonkowski/n8n-mcp.git || true
          git fetch upstream
          
          # Check for new commits
          UPSTREAM_COMMITS=$(git rev-list HEAD..upstream/main --count)
          echo "New commits from upstream: $UPSTREAM_COMMITS"
          
          if [ "$UPSTREAM_COMMITS" -gt 0 ]; then
            echo "🔄 Merging $UPSTREAM_COMMITS new commits from upstream..."
            git merge upstream/main --no-edit -m "chore: sync upstream czlonkowski/n8n-mcp"
            git push origin main
            echo "✅ Upstream sync complete"
          else
            echo "✅ Already up to date with upstream"
          fi

      # =========================================================================
      # Step 3: Setup Node.js and install dependencies
      # =========================================================================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # =========================================================================
      # Step 4: Build TypeScript and rebuild database
      # =========================================================================
      - name: Build and rebuild database
        run: |
          echo "🔨 Building TypeScript..."
          npm run build
          
          echo "🗃️ Rebuilding nodes database..."
          npm run rebuild
          
          # Validate database
          TEMPLATE_COUNT=$(sqlite3 data/nodes.db "SELECT COUNT(*) FROM templates" 2>/dev/null || echo "0")
          NODE_COUNT=$(sqlite3 data/nodes.db "SELECT COUNT(*) FROM nodes" 2>/dev/null || echo "0")
          
          echo "📊 Database stats:"
          echo "   Templates: $TEMPLATE_COUNT"
          echo "   Nodes: $NODE_COUNT"
          
          if [ "$TEMPLATE_COUNT" -lt 100 ]; then
            echo "❌ Database validation failed: too few templates ($TEMPLATE_COUNT)"
            exit 1
          fi
          
          echo "✅ Database rebuild complete"

      # =========================================================================
      # Step 5: Compress and upload to Supabase Storage
      # =========================================================================
      - name: Upload to Supabase Storage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "📦 Compressing database..."
          gzip -c data/nodes.db > nodes.db.gz
          
          ORIGINAL_SIZE=$(ls -lh data/nodes.db | awk '{print $5}')
          COMPRESSED_SIZE=$(ls -lh nodes.db.gz | awk '{print $5}')
          echo "   Original: $ORIGINAL_SIZE"
          echo "   Compressed: $COMPRESSED_SIZE"
          
          echo "📤 Uploading to Supabase Storage (build-cache bucket)..."
          
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PUT "${SUPABASE_URL}/storage/v1/object/build-cache/nodes.db.gz" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/gzip" \
            -H "x-upsert: true" \
            --data-binary @nodes.db.gz)
          
          if [ "$HTTP_STATUS" -eq 200 ] || [ "$HTTP_STATUS" -eq 201 ]; then
            echo "✅ Upload successful (HTTP $HTTP_STATUS)"
          else
            echo "❌ Upload failed (HTTP $HTTP_STATUS)"
            exit 1
          fi

      # =========================================================================
      # Step 6: Trigger Render redeploy
      # =========================================================================
      - name: Trigger Render redeploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ secrets.SERVICE_ID }}
        run: |
          echo "🚀 Triggering Render redeploy for Tech Factory..."
          
          RESPONSE=$(curl -s -X POST "https://api.render.com/v1/services/${SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}')
          
          DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
          
          if [ -n "$DEPLOY_ID" ]; then
            echo "✅ Render deploy triggered: $DEPLOY_ID"
            echo "   Dashboard: https://dashboard.render.com/web/${SERVICE_ID}/deploys/${DEPLOY_ID}"
          else
            echo "⚠️ Render deploy may have failed. Response:"
            echo "$RESPONSE"
            # Don't fail the workflow - the upload succeeded
          fi

      # =========================================================================
      # Step 7: Summary
      # =========================================================================
      - name: Summary
        run: |
          echo ""
          echo "=============================================="
          echo "Weekly Sync Complete"
          echo "=============================================="
          echo "✅ Upstream synced: czlonkowski/n8n-mcp → baxterlabsai/n8n-mcp"
          echo "✅ Database rebuilt: data/nodes.db"
          echo "✅ Uploaded to: Supabase Storage (build-cache/nodes.db.gz)"
          echo "✅ Render redeploy triggered"
          echo ""
          echo "Next run: $(date -d 'next sunday 06:00' '+%Y-%m-%d %H:%M UTC' 2>/dev/null || echo 'Next Sunday 6am UTC')"
